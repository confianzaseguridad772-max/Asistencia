<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Asistencia GP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Control de Asistencia GP</h2>
    
    <div class="form-group">
      <label>Líder de GP:</label>
      <select id="liderGp" onchange="cargarLista()">
        <option value="">Seleccione un líder...</option>
        <option>1-Cherry / Avril</option>
        <option>2-Tito / Zuliel</option>
        <option>3-Ricardo / Rosario</option>
        <option>4-Pedro /Rolando</option>
        <option>5-Erika /Valeria</option>
        <option>6-Jafet</option>
        <option>7-Gustabo /Jenny</option>
      </select>
    </div>

    <div class="form-group">
      <label>Nombre del Grupo:</label>
      <input type="text" id="nombreGrupo" placeholder="Nombre de la unidad/grupo...">
    </div>

    <div class="form-group">
      <label>Motivo de Reunión:</label>
      <input type="text" id="motivo" placeholder="Ej: Clase semanal, Reunión GP...">
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="marcarTodos(true)">Asistieron Todos</button>
      <button class="btn btn-primary" onclick="marcarTodos(false)">Limpiar</button>
    </div>

    <h3 class="section-title">Bautizados</h3>
    <table id="tablaBautizados">
      <thead><tr><th>Nombre</th><th>Asistió</th></tr></thead>
      <tbody></tbody>
    </table>

    <h3 class="section-title">Amigos de Esperanza</h3>
    <table id="tablaAmigos">
      <thead><tr><th>Nombre</th><th>Asistió</th></tr></thead>
      <tbody></tbody>
    </table>

    <div style="margin-top: 30px;">
      <button class="btn btn-accent" id="btnEnviar" onclick="enviarDatos()">Registrar Asistencia en Google Sheets</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
