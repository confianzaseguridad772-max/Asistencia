<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión GP - Vencedores</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="main-wrapper">
    <div class="container">
      <header class="main-header">
        <div class="logo-area">
          <h1>📊 Gestión de GP</h1>
          <p>Asistencia, Lecciones y Dones</p>
        </div>
        <div id="fechaDisplay" class="date-badge"></div>
      </header>
      
      <section class="config-card">
        <div class="input-grid">
          <div class="form-group">
            <label>👤 Seleccionar Líder de GP</label>
            <select id="selectLider" onchange="buscarPorLider()">
              <option value="">Seleccione...</option>
              <option value="1-Cherry / Avril">1-Cherry / Avril</option>
              <option value="2-Tito / Zuliel">2-Tito / Zuliel</option>
              <option value="3-Ricardo / Rosario">3-Ricardo / Rosario</option>
              <option value="4-Pedro / Rolando">4-Pedro / Rolando</option>
              <option value="5-Erika / Valeria">5-Erika / Valeria</option>
              <option value="6-Jafet">6-Jafet</option>
              <option value="7.Gustabo/Jenny">7.Gustabo/Jenny</option>
            </select>
          </div>
          <div class="form-group">
            <label>🏠 Nombre del Grupo</label>
            <input type="text" id="nombreGrupo" value="Vencedores">
          </div>
        </div>

        <div class="input-grid">
          <div class="form-group">
            <label>📝 Motivo de reunión</label>
            <select id="motivoReunion">
              <option value="GP:Hogares">GP:Hogares</option>
              <option value="GP:Unidad de Acción">GP:Unidad de Acción</option>
              <option value="GP:Estudios biblicos">GP:Estudios biblicos</option>
            </select>
          </div>
          <div class="form-group">
            <label>📅 Fecha de Registro</label>
            <input type="date" id="fechaManual">
          </div>
        </div>

        <div id="loading" style="display: none; text-align: center; color: #1a73e8; font-weight: bold; margin: 10px 0;">
          ⏳ Consultando Padrón y Dones...
        </div>

        <div class="input-grid extra-fields">
          <div class="form-group">
            <label>💰 S/. LES TOTAL</label>
            <input type="number" id="totalLes" step="0.1" value="0">
          </div>
          <div class="form-group">
            <label>🪙 S/. OFRENDAS</label>
            <input type="number" id="totalOfrendas" step="0.1" value="0">
          </div>
          <div class="form-group">
            <label>🌊 N° BAUTISMOS</label>
            <input type="number" id="numBautismo" value="0">
          </div>
        </div>
      </section>

      <div class="action-bar">
        <button class="btn-action all" onclick="marcarBloque(true)">✅ Marcar Todos</button>
        <button class="btn-action none" onclick="marcarBloque(false)">❌ Desmarcar</button>
      </div>

      <section class="table-section" id="seccionBautizados">
        <h3 class="table-title bautizados">⭐ Miembros Bautizados</h3>
        <div class="scroll-area">
          <table id="tablaBautizados">
            <thead>
              <tr>
                <th>Nombre / ¿Dones?</th>
                <th style="text-align:right">N° Lec | Asist</th>
              </tr>
            </thead>
            <tbody>
              </tbody>
          </table>
        </div>
      </section>

      <section class="table-section" id="seccionAmigos">
        <h3 class="table-title amigos">🌱 Amigos de esperanza</h3>
        <div class="scroll-area">
          <table id="tablaAmigos">
            <thead>
              <tr>
                <th>Nombre / ¿Dones?</th>
                <th style="text-align:right">N° Lec | Asist</th>
              </tr>
            </thead>
            <tbody>
              </tbody>
          </table>
        </div>
      </section>

      <button id="btnEnviar" class="btn-submit" onclick="enviarAsistencia()">Guardar Reporte General</button>
    </div>
  </div>

  <div id="modalResumen" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <div style="font-size: 50px;">✅</div>
      <h2>¡Registro Exitoso!</h2>
      <p>La asistencia se guardó y las lecciones fueron migradas al sistema correspondiente.</p>
      <button class="btn-modal-close" onclick="location.reload()">Aceptar y Refrescar</button>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    function marcarBloque(valor) {
      const checkboxes = document.querySelectorAll('.check-asis');
      checkboxes.forEach(cb => cb.checked = valor);
    }
  </script>
</body>
</html>
