<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Asistencia Gp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
        <div class="card-header bg-primary text-white text-center py-4">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Gustabo&backgroundColor=b6e3f4" alt="Avatar" class="rounded-circle mb-2" style="width: 80px;">
            <h2 class="mb-0">Control de Asistencia</h2>
            <p class="mb-0 opacity-75">Registro de Grupo Pequeño</p>
        </div>
        
        <div class="card-body p-4">
            <form id="asistenciaForm">
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Líder de Grupo</label>
                        <select id="liderGp" class="form-select" required onchange="actualizarNombreGrupo()">
                            <option value="">Seleccione un líder...</option>
                            <option value="1-Cherry">1-Cherry</option>
                            <option value="2-Tito">2-Tito</option>
                            <option value="3-Ricardo">3-Ricardo</option>
                            <option value="4-Pedro">4-Pedro</option>
                            <option value="5-Erika">5-Erika</option>
                            <option value="6-Jafet">6-Jafet</option>
                            <option value="7-Gustabo">7-Gustabo</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Nombre del Grupo</label>
                        <input type="text" id="nombreGrupo" class="form-control bg-light" readonly>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Motivo de Reunión</label>
                        <select id="motivo" class="form-select" required onchange="toggleInputs()">
                            <option value="Casas">Gp: Casas</option>
                            <option value="Unidad">Gp: Sábado (Unidad)</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Fecha (Semana)</label>
                        <select id="semana" class="form-select" required>
                            <option value="Abril-1">Abril - Semana 1</option>
                            <option value="Abril-2">Abril - Semana 2</option>
                            <option value="Abril-3">Abril - Semana 3</option>
                            <option value="Abril-4">Abril - Semana 4</option>
                        </select>
                    </div>
                </div>

                <hr>

                <div class="section-container mt-4">
                    <h4 class="text-primary border-bottom pb-2 mb-3"><i class="fas fa-church"></i> Bautizados</h4>
                    <div id="listaBautizados" class="list-group shadow-sm">
                        </div>
                </div>

                <div class="section-container mt-4">
                    <h4 class="text-success border-bottom pb-2 mb-3"><i class="fas fa-user-friends"></i> Amigos de Esperanza</h4>
                    <div id="listaAmigos" class="list-group shadow-sm">
                        </div>
                </div>

                <div class="text-center mt-5">
                    <button type="submit" class="btn btn-primary btn-lg px-5 rounded-pill shadow">
                        Enviar Asistencia <i class="fas fa-paper-plane ms-2"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
