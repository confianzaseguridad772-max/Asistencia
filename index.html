<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Asistencia Gp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
        <div class="card-header bg-primary text-white text-center py-4">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Gustabo&backgroundColor=b6e3f4" alt="Avatar" class="rounded-circle mb-2 shadow" style="width: 80px; background: white;">
            <h2 class="mb-0 fw-bold">Control de Asistencia</h2>
            <p class="mb-0 opacity-75">Sistema de Gestión de Grupos</p>
        </div>
        
        <div class="card-body p-4">
            <form id="asistenciaForm">
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Líder de Grupo</label>
                        <select id="liderGp" class="form-select border-2" required onchange="actualizarNombreGrupo()">
                            <option value="">Seleccione un líder...</option>
                            <option value="1-Cherry">1-Cherry</option>
                            <option value="2-Tito">2-Tito</option>
                            <option value="3-Ricardo">3-Ricardo</option>
                            <option value="4-Pedro">4-Pedro</option>
                            <option value="5-Erika">5-Erika</option>
                            <option value="6-Jafet">6-Jafet</option>
                            <option value="7-Gustabo">7-Gustabo</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Nombre del Grupo</label>
                        <input type="text" id="nombreGrupo" class="form-control bg-light fw-bold text-primary" readonly placeholder="Grupo...">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-bold">Motivo de Reunión</label>
                        <select id="motivo" class="form-select border-2" required onchange="toggleInputs()">
                            <option value="Casas">Gp: Casas</option>
                            <option value="Unidad">Gp: Sábado (Unidad)</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-bold">Fecha (Semana)</label>
                        <select id="semana" class="form-select border-2" required>
                            <optgroup label="Abril">
                                <option value="Abril-1">Abril-1</option>
                                <option value="Abril-2">Abril-2</option>
                                <option value="Abril-3">Abril-3</option>
                                <option value="Abril-4">Abril-4</option>
                            </optgroup>
                            <optgroup label="Mayo">
                                <option value="Mayo-1">Mayo-1</option>
                                <option value="Mayo-2">Mayo-2</option>
                                <option value="Mayo-3">Mayo-3</option>
                                <option value="Mayo-4">Mayo-4</option>
                                <option value="Mayo-5">Mayo-5</option>
                            </optgroup>
                        </select>
                    </div>
                </div>

                <hr class="my-4">

                <div class="section-container mt-4">
                    <div class="d-flex align-items-center mb-3">
                        <div class="bg-primary text-white rounded-circle p-2 me-2" style="width: 35px; height: 35px; display: flex; align-items: center; justify-content: center;">
                            <i class="fas fa-church"></i>
                        </div>
                        <h4 class="text-primary mb-0">Bautizados</h4>
                    </div>
                    <div id="listaBautizados" class="list-group shadow-sm rounded-3">
                        </div>
                </div>

                <div class="section-container mt-4">
                    <div class="d-flex align-items-center mb-3">
                        <div class="bg-success text-white rounded-circle p-2 me-2" style="width: 35px; height: 35px; display: flex; align-items: center; justify-content: center;">
                            <i class="fas fa-user-friends"></i>
                        </div>
                        <h4 class="text-success mb-0">Amigos de Esperanza</h4>
                    </div>
                    <div id="listaAmigos" class="list-group shadow-sm rounded-3">
                        </div>
                </div>

                <div class="text-center mt-5">
                    <button type="submit" class="btn btn-primary btn-lg px-5 rounded-pill shadow-lg fw-bold">
                        Enviar Asistencia <i class="fas fa-paper-plane ms-2"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
