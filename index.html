<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GP SERVIR 2026 | Gestión de Asistencia</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="main-wrapper">
    <div class="container">
      <header class="main-header">
        <div class="logo-area">
          <h1>📊 Gestión de GP</h1>
          <p>Registro de Asistencia y Lecciones</p>
        </div>
        <div id="fechaActual" class="date-badge"></div>
      </header>
      
      <section class="config-card">
        <div class="input-grid">
          <div class="form-group">
            <label>👤 Líder de GP</label>
            <select id="liderGp" onchange="cargarLista()">
              <option value="">Seleccione Líder...</option>
              <option value="1-Cherry / Avril">1-Cherry / Avril</option>
              <option value="2-Tito / Zuliel">2-Tito / Zuliel</option>
              <option value="3-Ricardo / Rosario">3-Ricardo / Rosario</option>
              <option value="4-Pedro / Rolando">4-Pedro / Rolando</option>
              <option value="5-Erika / Valeria">5-Erika / Valeria</option>
              <option value="6-Jafet">6-Jafet</option>
              <option value="7.Gustabo/Jenny">7.Gustabo/Jenny</option>
            </select>
          </div>
          <div class="form-group">
            <label>🏠 Nombre del Grupo</label>
            <input type="text" id="nombreGrupo" placeholder="Ej. Vencedores">
          </div>
          <div class="form-group">
            <label>📅 Motivo</label>
            <select id="motivo">
              <option>Reunión Semanal</option>
              <option>Parejas Discipuladoras</option>
              <option>Actividad Social</option>
            </select>
          </div>
        </div>

        <div class="input-grid extra-fields">
          <div class="form-group">
            <label>💰 S/. LES TOTAL</label>
            <input type="number" id="totalLes" step="0.1" value="0">
          </div>
          <div class="form-group">
            <label>🪙 S/. OFRENDAS</label>
            <input type="number" id="totalOfrendas" step="0.1" value="0">
          </div>
          <div class="form-group">
            <label>🌊 N° BAUTISMOS</label>
            <input type="number" id="numBautismo" value="0">
          </div>
        </div>
      </section>

      <div class="action-bar">
        <button class="btn-action all" onclick="marcarBloque(true)">✅ Todos Asistieron</button>
        <button class="btn-action none" onclick="marcarBloque(false)">❌ Limpiar Todo</button>
      </div>

      <section class="table-section">
        <h3 class="table-title bautizados">⭐ Bautizados (Estudio LES)</h3>
        <div class="scroll-area">
          <table id="tablaBautizados">
            <thead>
              <tr><th>Nombre</th><th style="text-align:right">N° Lec | Asist</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="table-section">
        <h3 class="table-title amigos">🌱 Amigos de esperanza</h3>
        <div class="scroll-area">
          <table id="tablaAmigos">
            <thead>
              <tr><th>Nombre del Amigo</th><th style="text-align:right">N° Lec | Asist</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <button id="btnEnviar" class="btn-submit" onclick="enviarDatos()">Guardar Reporte General</button>
    </div>
  </div>

  <div id="modalResumen" class="modal-overlay">
    <div class="modal-content">
      <h2>¡Registro Exitoso!</h2>
      <p>La información ha sido migrada a <b>Asist</b> y <b>Amigos</b> correctamente.</p>
      <button class="btn-modal-close" onclick="location.reload()">Aceptar</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
